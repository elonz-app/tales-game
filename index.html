<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blueman Space</title>
    <!-- 1. IMPORT SUPABASE JS LIBRARY -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #060b0d;
            --bg-surface: #0d1518;
            --bg-input: #131f24;
            --accent-blue: #00a3ff;
            --accent-glow: rgba(0, 163, 255, 0.35);
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --signal-green: #00e676;
            --signal-red: #ff3366;
            --red-glow: rgba(255, 51, 102, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Use dynamic viewport height to adapt to mobile browser toolbars */
        html, body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #10222b 0%, var(--bg-main) 70%);
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ADVANCED GRAPHIC LOGO */
        .logo-mark {
            position: relative;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .splash-logo {
            width: 70px;
            height: 70px;
            margin-bottom: 10px;
        }

        .logo-shape-1 {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid var(--accent-blue);
            border-radius: 35% 65% 60% 40% / 40% 45% 55% 60%;
            animation: morphGraphic 8s linear infinite;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-shape-2 {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 2px dashed #0066ff;
            border-radius: 60% 40% 40% 60% / 50% 60% 40% 50%;
            animation: morphGraphic 5s linear infinite reverse;
        }

        .logo-core {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff, 0 0 30px var(--accent-blue);
            z-index: 2;
        }

        .splash-logo .logo-core {
            width: 24px;
            height: 24px;
        }

        @keyframes morphGraphic {
            0% { border-radius: 35% 65% 60% 40% / 40% 45% 55% 60%; transform: rotate(0deg); }
            50% { border-radius: 50% 50% 30% 70% / 50% 30% 70% 50%; }
            100% { border-radius: 35% 65% 60% 40% / 40% 45% 55% 60%; transform: rotate(360deg); }
        }

        /* LOADING HUB PORTAL */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.25s ease;
        }

        .app-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 4px;
            color: #fff;
            margin-top: 15px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .progress-box {
            width: 220px;
            height: 4px;
            background-color: var(--bg-input);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 30px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0066ff, var(--accent-blue));
            box-shadow: 0 0 10px var(--accent-blue);
        }

        .counter-text {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-blue);
            letter-spacing: 1px;
        }

        /* LOGIN INTERFACE */
        #login-screen {
            display: none;
            background: var(--bg-surface);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.04);
            animation: screenRise 0.4s cubic-bezier(0.1, 1, 0.1, 1) forwards;
        }

        @keyframes screenRise {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.05);
            background-color: var(--bg-input);
            color: var(--text-primary);
            border-radius: 14px;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(0, 163, 255, 0.2);
        }

        button.action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0066ff, var(--accent-blue));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0, 102, 255, 0.3);
        }

        /* ADAPTIVE CHATROOM VIEWPORT */
        #chat-screen {
            display: none;
            width: 100%;
            height: 100%; /* Spans full dynamic height, keeping input bar inside window boundaries */
            background: var(--bg-surface);
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            #chat-screen {
                max-width: 1100px;
                height: 90vh;
                border-radius: 24px;
                border: 1px solid rgba(255,255,255,0.04);
                box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            }
        }

        /* FIXED HEADER */
        .chat-header {
            height: 75px;
            background-color: var(--bg-surface);
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h3 { font-size: 16px; font-weight: 600; color: #fff;}
        
        .status-container {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 1px;
        }
        .beacon-light {
            width: 6px;
            height: 6px;
            background-color: var(--signal-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--signal-green);
            animation: pulseBeacon 2s infinite;
        }
        .status-text-live {
            font-size: 12px;
            font-weight: 600;
            color: var(--signal-green);
        }

        @keyframes pulseBeacon {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* TEARDOWN BUTTON */
        .teardown-trigger {
            padding: 10px 16px;
            background: linear-gradient(135deg, rgba(255, 51, 102, 0.05), rgba(255, 51, 102, 0.12));
            border: 1px solid rgba(255, 51, 102, 0.4);
            border-radius: 12px;
            color: #ff4d7d;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }
        .teardown-trigger:hover {
            background: var(--signal-red);
            color: white;
            border-color: var(--signal-red);
            box-shadow: 0 0 20px var(--red-glow);
        }

        /* SCROLLABLE MESSAGE STREAM AREA */
        .message-area {
            flex: 1;               /* Dynamically claims all workspace area between header and input form */
            overflow-y: auto;       /* Isolates scrolling exclusively here */
            overflow-x: hidden;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: var(--bg-main);
            background-image: radial-gradient(rgba(255,255,255,0.015) 1px, transparent 0);
            background-size: 24px 24px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14.5px;
            line-height: 1.45;
            word-wrap: break-word;
            animation: messagePop 0.2s cubic-bezier(0.1, 1, 0.1, 1) forwards;
        }

        @keyframes messagePop {
            from { opacity: 0; transform: scale(0.97) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (min-width: 768px) { .message { max-width: 55%; } }

        .message.sent {
            background: linear-gradient(135deg, #005c4b, #004d3f);
            color: var(--text-primary);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .message.received {
            background-color: var(--bg-input);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.01);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .message .username {
            font-weight: 700;
            font-size: 11px;
            color: var(--accent-blue);
            display: block;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .media-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            margin-top: 6px;
            display: block;
        }

        /* FIXED INPUT FOOTER BAR */
        .input-bar {
            height: 70px;
            background-color: var(--bg-surface);
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0; /* Prevents this bar from being hidden or scaled down */
            z-index: 10;
        }

        .input-bar input[type="text"] {
            flex: 1; margin: 0; border: 1px solid rgba(255,255,255,0.02);
            padding: 12px 14px; background-color: var(--bg-input);
            border-radius: 12px; color: var(--text-primary);
            font-size: 15px;
        }

        .file-label {
            cursor: pointer; font-size: 18px; color: var(--text-secondary);
            padding: 4px;
        }
        #file-input { display: none; }

        .view-once-toggle {
            display: flex; align-items: center; gap: 4px;
            font-size: 12px; color: var(--text-secondary); cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .view-once-toggle input { width: 14px; height: 14px; accent-color: var(--accent-blue); }

        .send-btn {
            background: linear-gradient(135deg, #0066ff, var(--accent-blue)); 
            color: white; border: none;
            width: 42px; height: 42px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 15px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- CHANNELS INITIAL SPLASH LOGO VIEW -->
        <div id="splash-screen">
            <div class="logo-mark splash-logo">
                <div class="logo-shape-1"></div>
                <div class="logo-shape-2"></div>
                <div class="logo-core"></div>
            </div>
            <div class="app-title">BLUEMAN</div>
            <div class="progress-box">
                <div class="progress-bar" id="load-bar"></div>
            </div>
            <div class="counter-text" id="load-counter">0%</div>
        </div>

        <!-- AUTH GATEWAY INTERFACE -->
        <div id="login-screen">
            <div style="display:flex; justify-content:center; margin-bottom:20px;">
                <div class="logo-mark splash-logo" style="width:60px; height:60px;">
                    <div class="logo-shape-1"></div>
                    <div class="logo-shape-2"></div>
                    <div class="logo-core"></div>
                </div>
            </div>
            <h2 style="margin-bottom:4px; font-weight:700;">Gateway Access</h2>
            <p style="color:var(--text-secondary); font-size:14px; margin-bottom:24px;">Cloud Core Interconnect Active</p>
            <input type="text" id="username-input" placeholder="Pick a display handle" autocomplete="off" />
            <input type="password" id="passcode-input" placeholder="Access key passcode" />
            <button class="action-btn" onclick="verifyCredentials()">Initialize Link</button>
        </div>

        <!-- LIVE MAIN INTERACT WORKSPACE -->
        <div id="chat-screen">
            <div class="chat-header">
                <div class="header-profile">
                    <!-- Advanced dynamic custom logo structure replacing standard letter badge -->
                    <div class="logo-mark">
                        <div class="logo-shape-1"></div>
                        <div class="logo-shape-2"></div>
                        <div class="logo-core"></div>
                    </div>
                    <div>
                        <h3>Blueman Space</h3>
                        <div class="status-container">
                            <div class="beacon-light"></div>
                            <span class="status-text-live">Online</span>
                        </div>
                    </div>
                </div>
                <button class="teardown-trigger" onclick="window.location.reload()">Teardown</button>
            </div>

            <!-- Scrollable chronological timeline message log layer -->
            <div class="message-area" id="message-area"></div>

            <form class="input-bar" id="chat-form" onsubmit="dispatchPayload(event)">
                <label for="file-input" class="file-label" title="Upload Media File">📎</label>
                <input type="file" id="file-input" accept="image/*,video/*" onchange="fileSelectionHook()" />
                <input type="text" id="msg-text" placeholder="Type safe message..." autocomplete="off" />
                <label class="view-once-toggle">
                    <input type="checkbox" id="view-once-chk" /> 1️⃣ View Once
                </label>
                <button type="submit" class="send-btn">➔</button>
            </form>
        </div>
    </div>

    <script>
        const TARGET_PASS = "blueman";
        
        // Configured cloud system nodes
        const SUPABASE_URL = "https://tgyxaklevhsbyorogzxx.supabase.co";
        const SUPABASE_ANON_KEY = "Sb_publishable_99Bg8s2ZaO17gE3WqUOQlA_a9_dt644";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUserHandle = "User";
        let memoryArrayLog = [];

        // Dynamic Loading Tracker Counter Logic
        window.addEventListener("DOMContentLoaded", () => {
            const bar = document.getElementById("load-bar");
            const counter = document.getElementById("load-counter");
            let progress = 0;
            
            const loaderInterval = setInterval(() => {
                progress += 2;
                bar.style.width = `${progress}%`;
                counter.innerText = `${progress}%`;
                
                if (progress >= 100) {
                    clearInterval(loaderInterval);
                    document.getElementById("splash-screen").style.opacity = "0";
                    setTimeout(() => {
                        document.getElementById("splash-screen").style.display = "none";
                        document.getElementById("login-screen").style.display = "block";
                    }, 250);
                }
            }, 30);
        });

        function verifyCredentials() {
            const userText = document.getElementById("username-input").value.trim();
            const passText = document.getElementById("passcode-input").value;

            if (!userText) { alert("Handle cannot be blank."); return; }
            if (passText === TARGET_PASS) {
                currentUserHandle = userText;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("chat-screen").style.display = "flex";
                
                initializeSupabaseRealtime();
            } else {
                alert("Incorrect Passcode.");
            }
        }

        function initializeSupabaseRealtime() {
            fetchHistoricalLog();

            supabaseClient
                .channel('room-messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const incomingMsg = payload.new;
                    if (incomingMsg.sender !== currentUserHandle) {
                        memoryArrayLog.push(incomingMsg);
                        renderWorkspaceDOM();
                    }
                })
                .subscribe();
        }

        async function fetchHistoricalLog() {
            const { data, error } = await supabaseClient
                .from('messages')
                .select('*')
                .order('id', { ascending: true });
            
            if (!error && data) {
                memoryArrayLog = data;
                renderWorkspaceDOM();
            }
        }

        function fileSelectionHook() {
            const input = document.getElementById("file-input");
            if (input.files.length > 0) {
                document.getElementById("msg-text").placeholder = `File: [${input.files[0].name}]`;
            }
        }

        async function dispatchPayload(e) {
            e.preventDefault();
            const textField = document.getElementById("msg-text");
            const fileInput = document.getElementById("file-input");
            const viewOnceBox = document.getElementById("view-once-chk");

            if (!textField.value.trim() && fileInput.files.length === 0) return;

            let objectBlobString = null;
            let capturedMimeType = null;

            if (fileInput.files.length > 0) {
                const attachedFile = fileInput.files[0];
                objectBlobString = URL.createObjectURL(attachedFile);
                capturedMimeType = attachedFile.type;
            }

            const messageObject = {
                uid: "msg_" + Math.random().toString(36).substring(2, 11),
                sender: currentUserHandle,
                messageText: textField.value.trim(),
                fileBlob: objectBlobString,
                fileType: capturedMimeType,
                viewOnceFlag: viewOnceBox.checked,
                spent: false
            };

            memoryArrayLog.push(messageObject);
            renderWorkspaceDOM();

            await supabaseClient.from('messages').insert([messageObject]);

            textField.value = "";
            textField.placeholder = "Type safe message...";
            fileInput.value = "";
            viewOnceBox.checked = false;
        }

        function renderWorkspaceDOM() {
            const chatContainer = document.getElementById("message-area");
            chatContainer.innerHTML = "";

            memoryArrayLog.forEach(item => {
                const wrapper = document.createElement("div");
                wrapper.className = `message ${item.sender === currentUserHandle ? 'sent' : 'received'}`;

                let bodyLayout = `<span class="username">${item.sender}</span>`;
                if (item.messageText) bodyLayout += `<div>${item.messageText}</div>`;
                wrapper.innerHTML = bodyLayout;

                if (item.fileBlob) {
                    if (item.viewOnceFlag) {
                        if (!item.spent) {
                            const btn = document.createElement("button");
                            btn.className = "view-once-btn";
                            btn.innerHTML = "1️⃣ Open View Once Media";
                            btn.onclick = () => fireMediaInterception(item.uid);
                            wrapper.appendChild(btn);
                        } else {
                            wrapper.appendChild(createDestroyedLabel());
                        }
                    } else {
                        buildStandardMediaElement(wrapper, item.fileBlob, item.fileType);
                    }
                } else if (item.viewOnceFlag && item.spent) {
                    wrapper.appendChild(createDestroyedLabel());
                }

                chatContainer.appendChild(wrapper);
            });
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function createDestroyedLabel() {
            const div = document.createElement("div");
            div.className = "destroyed-text";
            div.innerHTML = "🔓 Opened & Wiped from RAM";
            return div;
        }

        function buildStandardMediaElement(targetDiv, dataUrl, mimeType) {
            if (mimeType && mimeType.startsWith("image/")) {
                const image = document.createElement("img");
                image.src = dataUrl;
                image.className = "media-preview";
                targetDiv.appendChild(image);
            } else if (mimeType && mimeType.startsWith("video/")) {
                const video = document.createElement("video");
                video.src = dataUrl;
                video.className = "media-preview";
                video.controls = true;
                targetDiv.appendChild(video);
            }
        }

        function fireMediaInterception(uid) {
            const index = memoryArrayLog.findIndex(m => m.uid === uid);
            if (index !== -1) {
                const node = memoryArrayLog[index];
                const sandboxedWindow = window.open("", "_blank", "width=700,height=700");
                if (sandboxedWindow) {
                    sandboxedWindow.document.write(`
                        <body style="margin:0; background:#060b0d; display:flex; justify-content:center; align-items:center; height:100vh;">
                            ${node.fileType.startsWith('image/') ? 
                                `<img src="${node.fileBlob}" style="max-width:95%; max-height:95%; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">` : 
                                `<video src="${node.fileBlob}" controls autoplay style="max-width:95%; max-height:95%;">`
                            }
                        </body>
                    `);
                } else {
                    alert("Popup blocker active.");
                    return;
                }
                URL.revokeObjectURL(node.fileBlob);
                node.fileBlob = null;
                node.spent = true;
                renderWorkspaceDOM();
            }
        }
    </script>
</body>
</html>
